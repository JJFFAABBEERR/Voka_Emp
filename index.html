function escapeHtml(text) {
  if (text === null || text === undefined) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function generateId() {
  return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
}

function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500', info: 'bg-blue-500' };
  const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
  const toast = document.createElement('div');
  toast.className = `toast ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 min-w-[300px]`;
  toast.innerHTML = `<span class="text-xl font-bold">${icons[type]}</span><span class="font-medium">${escapeHtml(message)}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

async function initFirebase() {
  try {
    if (!db) throw new Error('Firebase no inicializado');
    
    const [usersSnap, programsSnap, categoriesSnap, centersSnap, requestsSnap, auditSnap] = await Promise.all([
      db.collection('users').get(),
      db.collection('programs').get(),
      db.collection('categories').get(),
      db.collection('centers').get(),
      db.collection('requests').get(),
      db.collection('audit').get()
    ]);

    if (usersSnap.empty || programsSnap.empty || categoriesSnap.empty || centersSnap.empty) {
      console.log('🌱 Sembrando datos iniciales...');
      await seedInitialData();
      const [u2, p2, c2, ce2, r2, a2] = await Promise.all([
        db.collection('users').get(), db.collection('programs').get(),
        db.collection('categories').get(), db.collection('centers').get(),
        db.collection('requests').get(), db.collection('audit').get()
      ]);
      state.users = u2.docs.map(d => ({ id: d.id, ...d.data() }));
      state.programs = p2.docs.map(d => ({ id: d.id, ...d.data() }));
      state.categories = c2.docs.map(d => ({ id: d.id, ...d.data() }));
      state.centers = ce2.docs.map(d => ({ id: d.id, ...d.data() }));
      state.requests = r2.docs.map(d => ({ id: d.id, ...d.data() }));
      state.audit = a2.docs.map(d => ({ id: d.id, ...d.data() }));
    } else {
      state.users = usersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.programs = programsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.categories = categoriesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.centers = centersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.requests = requestsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      state.audit = auditSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    state.firebaseReady = true;
    state.firebaseError = null;
    console.log('✅ Firebase cargado:', state.users.length, 'usuarios,', state.programs.length, 'programas');
    document.getElementById('loadingOverlay').style.display = 'none';
    render();
  } catch (error) {
    console.error('❌ Error Firebase:', error);
    state.firebaseError = error.message;
    showToast('Error Firebase: ' + error.message + '. Usando datos locales.', 'error');
    state.users = JSON.parse(JSON.stringify(DEFAULT_USERS));
    state.programs = JSON.parse(JSON.stringify(DEFAULT_PROGRAMS));
    state.categories = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES));
    state.centers = JSON.parse(JSON.stringify(DEFAULT_CENTERS));
    state.requests = JSON.parse(JSON.stringify(DEFAULT_REQUESTS));
    state.audit = JSON.parse(JSON.stringify(DEFAULT_AUDIT));
    state.firebaseReady = true;
    document.getElementById('loadingOverlay').style.display = 'none';
    render();
  }
}

async function seedInitialData() {
  const batch = db.batch();
  DEFAULT_USERS.forEach(u => batch.set(db.collection('users').doc(u.id), u));
  DEFAULT_PROGRAMS.forEach(p => batch.set(db.collection('programs').doc(p.id), p));
  DEFAULT_CATEGORIES.forEach(c => batch.set(db.collection('categories').doc(c.id), c));
  DEFAULT_CENTERS.forEach(c => batch.set(db.collection('centers').doc(c.id), c));
  DEFAULT_REQUESTS.forEach(r => batch.set(db.collection('requests').doc(r.id), r));
  DEFAULT_AUDIT.forEach(a => batch.set(db.collection('audit').doc(a.id), a));
  await batch.commit();
  console.log('✅ Datos sembrados en Firebase');
}

async function saveToFirebase(collection, data, id = null) {
  try {
    if (!db) return id;
    if (id) {
      await db.collection(collection).doc(id).set(data);
    } else {
      const ref = await db.collection(collection).add(data);
      return ref.id;
    }
    return id;
  } catch (e) {
    console.error('Error guardando en', collection, e);
    return id;
  }
}

async function updateFirebase(collection, id, data) {
  try {
    if (db) await db.collection(collection).doc(id).update(data);
  } catch (e) {
    console.error('Error actualizando en', collection, e);
  }
}

async function deleteFromFirebase(collection, id) {
  try {
    if (db) await db.collection(collection).doc(id).delete();
  } catch (e) {
    console.error('Error eliminando de', collection, e);
  }
}

async function addAudit(action) {
  if (!state.currentUser) return;
  const auditData = {
    id: generateId(),
    userId: state.currentUser.id,
    action: action,
    timestamp: new Date().toLocaleString('es-CO')
  };
  state.audit.push(auditData);
  await saveToFirebase('audit', auditData, auditData.id);
}

async function login(email, password) {
  const user = state.users.find(u => u.email === email && u.password === password);
  if (user) {
    state.currentUser = user;
    await addAudit('Inicio de sesión');
    showToast('Bienvenido ' + user.name, 'success');
    navigate(user.role === 'empresario' ? 'catalogo' : user.role === 'admin' ? 'adminPanel' : 'superPanel');
    return true;
  }
  showToast('Credenciales incorrectas', 'error');
  return false;
}

async function register(data) {
  if (state.users.find(u => u.email === data.email)) {
    showToast('El correo ya está registrado', 'error');
    return false;
  }
  const user = {
    id: generateId(),
    ...data,
    role: 'empresario',
    createdAt: new Date().toISOString().split('T')[0]
  };
  state.users.push(user);
  await saveToFirebase('users', user, user.id);
  await addAudit('Registro de nuevo empresario: ' + data.email);
  showToast('Registro exitoso', 'success');
  state.currentUser = user;
  navigate('catalogo');
  return true;
}

async function logout() {
  if (state.currentUser) await addAudit('Cierre de sesión');
  state.currentUser = null;
  state.selectedPrograms = [];
  navigate('login');
}

function navigate(view) {
  state.currentView = view;
  render();
  window.scrollTo(0, 0);
}

// ============================================
// RENDER PRINCIPAL
// ============================================
function render() {
  const app = document.getElementById('app');
  if (!state.currentUser) {
    if (state.currentView === 'register') app.innerHTML = renderRegister();
    else if (state.currentView === 'recover') app.innerHTML = renderRecover();
    else app.innerHTML = renderLogin();
  } else {
    const role = state.currentUser.role;
    if (role === 'empresario') {
      const views = {
        catalogo: renderCatalogo,
        solicitud: renderSolicitud,
        historial: renderHistorial,
        perfil: renderPerfil
      };
      app.innerHTML = renderEmpresarioLayout((views[state.currentView] || renderCatalogo)());
    } else if (role === 'admin') {
      const views = {
        adminPanel: renderAdminDashboard,
        adminRequests: renderAdminRequests,
        adminReports: renderAdminReports,
        adminAudit: renderAdminAudit
      };
      app.innerHTML = renderAdminLayout((views[state.currentView] || renderAdminDashboard)());
    } else if (role === 'superadmin') {
      const views = {
        superPanel: renderSuperDashboard,
        superUsers: renderSuperUsers,
        superPrograms: renderSuperPrograms,
        superCategories: renderSuperCategories,
        superCenters: renderSuperCenters,
        superAudit: renderAdminAudit
      };
      try {
        const viewFn = views[state.currentView] || renderSuperDashboard;
        app.innerHTML = renderSuperLayout(viewFn());
      } catch (err) {
        console.error('❌ Error renderizando vista superadmin:', state.currentView, err);
        app.innerHTML = renderSuperLayout(`<div class="bg-red-50 border border-red-200 rounded-xl p-6"><h3 class="font-bold text-red-700 mb-2">Error al cargar la vista</h3><p class="text-red-600 text-sm">${escapeHtml(err.message)}</p><button data-nav="superPanel" class="mt-4 sena-btn px-4 py-2 rounded-lg font-semibold cursor-pointer">← Volver al Dashboard</button></div>`);
      }
    }
  }
}

function renderCatalogo() {
  const filtered = state.programs.filter(p => {
    const s = !state.searchQuery || p.name.toLowerCase().includes(state.searchQuery.toLowerCase()) || p.description.toLowerCase().includes(state.searchQuery.toLowerCase());
    const c = !state.filterCategory || p.categoryId === state.filterCategory;
    const ce = !state.filterCenter || p.centerId === state.filterCenter;
    return s && c && ce;
  });
  return `
    <div>
      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">Catálogo de Programas</h2>
        <p class="text-gray-500 text-sm mb-4">${state.programs.length} programas en ${state.categories.length} categorías</p>
        <div class="flex flex-col md:flex-row gap-3">
          <input id="searchInput" value="${escapeHtml(state.searchQuery)}" class="input-sena flex-1 px-4 py-3 rounded-lg" placeholder=" Buscar...">
          <select id="filterCategory" class="input-sena px-4 py-3 rounded-lg md:w-64">
            <option value="">Todas las categorías</option>
            ${state.categories.map(c => `<option value="${c.id}" ${state.filterCategory === c.id ? 'selected' : ''}>${c.icon} ${escapeHtml(c.name)}</option>`).join('')}
          </select>
          <select id="filterCenter" class="input-sena px-4 py-3 rounded-lg md:w-64">
            <option value="">Todos los centros</option>
            ${state.centers.map(c => `<option value="${c.id}" ${state.filterCenter === c.id ? 'selected' : ''}>${escapeHtml(c.code)} - ${escapeHtml(c.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      ${state.selectedPrograms.length > 0 ? `<div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-lg mb-6"><div class="flex items-center justify-between"><div><p class="font-semibold text-yellow-800">${state.selectedPrograms.length} seleccionado(s)</p></div><button data-nav="solicitud" class="sena-btn px-6 py-2 rounded-lg font-semibold cursor-pointer">Crear Solicitud →</button></div></div>` : ''}
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
        ${filtered.map(p => {
          const cat = state.categories.find(c => c.id === p.categoryId);
          const center = state.centers.find(c => c.id === p.centerId);
          const selected = state.selectedPrograms.includes(p.id);
          return `<div data-action="toggle-program" data-id="${p.id}" class="program-card ${selected ? 'selected' : ''} bg-white rounded-xl shadow p-5 card-hover cursor-pointer"><div class="flex items-start justify-between mb-3"><span class="text-3xl">${cat?.icon || '📚'}</span>${selected ? '<span class="badge badge-yellow">✓ Seleccionado</span>' : '<span class="badge badge-gray">Disponible</span>'}</div><h3 class="font-bold text-gray-800 mb-1">${escapeHtml(p.name)}</h3><p class="text-xs text-green-600 font-semibold mb-1">${escapeHtml(cat?.name || '')}</p><p class="text-xs text-blue-600 mb-2"> ${escapeHtml(center?.code || '')} - ${escapeHtml(center?.name || '')}</p><p class="text-sm text-gray-600 mb-3 line-clamp-3">${escapeHtml(p.description)}</p><div class="flex items-center justify-between text-xs"><span class="text-gray-500">⏱️ ${escapeHtml(p.duration)}</span><button class="${selected ? 'sena-btn-red' : 'sena-btn'} text-white px-3 py-1 rounded text-xs font-semibold cursor-pointer">${selected ? 'Quitar' : 'Seleccionar'}</button></div></div>`;
        }).join('')}
      </div>
      ${filtered.length === 0 ? '<div class="text-center py-12 text-gray-500">No se encontraron programas</div>' : ''}
    </div>`;
}

  return `
    <div class="bg-white rounded-xl shadow p-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-1">Historial de Solicitudes</h2>

        <div class="space-y-4">
          ${userRequests.map(r => {
            const statusColors = { pendiente: 'badge-yellow', aprobada: 'badge-green', rechazada: 'badge-red', en_proceso: 'badge-blue' };
            const statusLabels = { pendiente: 'Pendiente', aprobada: 'Aprobada', rechazada: 'Rechazada', en_proceso: 'En proceso' };
            const programs = r.programs.map(pid => state.programs.find(p => p.id === pid)).filter(Boolean);
            return `<div class="border border-gray-200 rounded-xl p-5 hover:shadow-md transition"><div class="flex flex-col md:flex-row md:items-center justify-between mb-3 gap-2"><div><p class="text-xs text-gray-500">#${r.id.slice(-6).toUpperCase()} · ${r.createdAt}</p><h3 class="font-bold text-gray-800">${programs.map(p => escapeHtml(p.name)).join(', ')}</h3></div><span class="badge ${statusColors[r.status]}">${statusLabels[r.status]}</span></div><div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm"><div><span class="text-gray-500">Aprendices:</span> <b>${escapeHtml(r.apprenticeRange)}</b></div><div><span class="text-gray-500">Horario:</span> <b class="capitalize">${escapeHtml(r.schedule)}</b></div><div><span class="text-gray-500">Programas:</span> <b>${programs.length}</b></div><div><span class="text-gray-500">Fecha:</span> <b>${r.createdAt}</b></div></div>${r.observations ? `<div class="mt-3 pt-3 border-t text-sm"><span class="text-gray-500">Observaciones:</span> <p class="text-gray-700 mt-1">${escapeHtml(r.observations)}</p></div>` : ''}</div>`;

function closeModal() {
  document.getElementById('modalContainer').innerHTML = '';
}

function createModal(contentHTML) {
  const container = document.getElementById('modalContainer');
  container.innerHTML = '';
  
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };
  
  const content = document.createElement('div');
  content.className = 'modal-content bg-white rounded-2xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto';
  content.innerHTML = contentHTML;
  
  overlay.appendChild(content);
  container.appendChild(overlay);
}

// ============================================
// EVENT DELEGATION UNIFICADO (CORREGIDO Y ROBUSTO)
// ============================================
document.addEventListener('click', (e) => {
  // 1. PRIORIDAD 1: NAVEGACIÓN (data-nav)
  // Buscamos el elemento más cercano con data-nav
  const navTarget = e.target.closest('[data-nav]');
  if (navTarget) {
    e.preventDefault(); // Evitamos cualquier comportamiento por defecto del enlace <a>
    e.stopPropagation(); // Detenemos la propagación para evitar conflictos
    
    const view = navTarget.getAttribute('data-nav');
    console.log('🧭 [NAV] Clic detectado en:', view);
    
    if (view) {
      navigate(view);
    } else {
      console.warn('⚠️ data-nav encontrado pero sin valor');
    }
    return; // Salimos inmediatamente
  }

  // 2. PRIORIDAD 2: ACCIONES (data-action)
  const actionTarget = e.target.closest('[data-action]');
  if (actionTarget) {
    e.preventDefault();
    e.stopPropagation();
    
    const action = actionTarget.getAttribute('data-action');
    const id = actionTarget.getAttribute('data-id');
    
    console.log('🖱️ [ACTION] Clic detectado:', action, 'ID:', id);
    
    switch (action) {
      case 'logout':
        logout();
        break;
      case 'toggle-program':
        toggleProgram(id);
        break;
      case 'clear-selection':
        state.selectedPrograms = [];
        navigate('catalogo');
        break;
      case 'update-status':
        const status = actionTarget.getAttribute('data-status');
        updateRequestStatus(id, status);
        break;
      case 'new-user':
        openUserModal(null);
        break;
      case 'edit-user':
        openUserModal(id);
        break;
      case 'delete-user':
        deleteUser(id);
        break;
      case 'new-program':
        openProgramModal(null);
        break;
      case 'edit-program':
        openProgramModal(id);
        break;
      case 'delete-program':
        deleteProgram(id);
        break;
      case 'new-category':
        openCategoryModal(null);
        break;
      case 'edit-category':
        openCategoryModal(id);
        break;
      case 'delete-category':
        deleteCategory(id);
        break;
      case 'new-center':
        openCenterModal(null);
        break;
      case 'edit-center':
        openCenterModal(id);
        break;
      case 'delete-center':
        deleteCenter(id);
        break;
      case 'export-requests-pdf':
        exportRequestsPDF();
        break;
      case 'export-requests-excel':
        exportRequestsExcel();
        break;
      case 'export-users-pdf':
        exportUsersPDF();
        break;
      case 'export-users-excel':
        exportUsersExcel();
        break;
      case 'export-programs-pdf':
        exportProgramsPDF();
        break;
      case 'export-programs-excel':
        exportProgramsExcel();
        break;
      default:
        console.warn('⚠️ Acción desconocida:', action);
    }
  }
});

// Form submissions
document.addEventListener('submit', (e) => {
  const formId = e.target.id;
  
  if (formId === 'loginForm') {
    e.preventDefault();
    login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
  } else if (formId === 'registerForm') {
    e.preventDefault();
    register({
      name: document.getElementById('regName').value,
      email: document.getElementById('regEmail').value,
      phone: document.getElementById('regPhone').value,
      company: document.getElementById('regCompany').value,
      password: document.getElementById('regPassword').value
    });
  } else if (formId === 'recoverForm') {
    e.preventDefault();
    const email = document.getElementById('recoverEmail').value;
    if (state.users.find(u => u.email === email)) {
      showToast('Enlace enviado a ' + email, 'success');
      setTimeout(() => navigate('login'), 1500);
    } else {
      showToast('Correo no registrado', 'error');
    }
  } else if (formId === 'requestForm') {
    e.preventDefault();
    handleSubmitRequest();
  } else if (formId === 'profileForm') {
    e.preventDefault();
    handleUpdateProfile();
  }
});

// ============================================
// HANDLERS
// ============================================
function toggleProgram(id) {
  const idx = state.selectedPrograms.indexOf(id);
  if (idx > -1) state.selectedPrograms.splice(idx, 1);
  else state.selectedPrograms.push(id);
  render();
}

async function handleSubmitRequest() {
  if (state.selectedPrograms.length === 0) { showToast('Seleccione al menos un programa', 'error'); return; }
  const req = {
    id: generateId(),
    userId: state.currentUser.id,
    programs: [...state.selectedPrograms],
    apprenticeRange: document.getElementById('reqApprenticeRange').value,
    schedule: document.getElementById('reqSchedule').value,
    observations: document.getElementById('reqObservations').value,
    status: 'pendiente',
    createdAt: new Date().toISOString().split('T')[0]
  };
  state.requests.push(req);
  await saveToFirebase('requests', req, req.id);
  await addAudit('Registro de solicitud ' + req.id);
  showToast('✓ Solicitud enviada', 'success');
  state.selectedPrograms = [];
  navigate('historial');
}

async function handleUpdateProfile() {
  state.currentUser.name = document.getElementById('profName').value;
  state.currentUser.phone = document.getElementById('profPhone').value;
  state.currentUser.company = document.getElementById('profCompany').value;
  const idx = state.users.findIndex(u => u.id === state.currentUser.id);
  state.users[idx] = state.currentUser;
  await updateFirebase('users', state.currentUser.id, state.currentUser);
  await addAudit('Actualización de perfil');
  showToast('Perfil actualizado', 'success');
  render();
}

async function updateRequestStatus(id, status) {
  const req = state.requests.find(r => r.id === id);
  if (req) {
    req.status = status;
    await updateFirebase('requests', id, { status });
    await addAudit('Cambio estado solicitud ' + id + ' a ' + status);
    showToast('Solicitud actualizada', 'success');
    render();
  }
}

async function saveUser(userId) {
  console.log('💾 Guardando usuario:', userId);
  const name = document.getElementById('mUserName').value.trim();
  const email = document.getElementById('mUserEmail').value.trim();
  const phone = document.getElementById('mUserPhone').value.trim();
  const company = document.getElementById('mUserCompany').value.trim();
  const role = document.getElementById('mUserRole').value;
  const password = document.getElementById('mUserPassword').value;
  
  if (!name || !email) {
    showToast('Nombre y correo son obligatorios', 'error');
    return;
  }
  
  if (userId) {
    const idx = state.users.findIndex(u => u.id === userId);
    if (idx !== -1) {
      state.users[idx].name = name;
      state.users[idx].email = email;
      state.users[idx].phone = phone;
      state.users[idx].company = company;
      state.users[idx].role = role;
      if (password && password.trim() !== '') {
        state.users[idx].password = password;
      }
      await updateFirebase('users', userId, state.users[idx]);
      await addAudit('Edición usuario: ' + email);
      showToast('✅ Usuario actualizado', 'success');
    }
  } else {
    if (!password || password.length < 6) {
      showToast('La contraseña debe tener al menos 6 caracteres', 'error');
      return;
    }
    if (state.users.find(u => u.email === email)) {
      showToast('El correo ya está registrado', 'error');
      return;
    }
    const newUser = {
      id: generateId(),
      name: name,
      email: email,
      phone: phone,
      company: company,
      role: role,
      password: password,
      createdAt: new Date().toISOString().split('T')[0]
    };
    state.users.push(newUser);
    await saveToFirebase('users', newUser, newUser.id);
    await addAudit('Creación usuario: ' + email);
    showToast('✅ Usuario creado', 'success');
  }
  closeModal();
  render();
}

async function deleteUser(id) {
  if (!confirm('¿Eliminar este usuario?')) return;
  const user = state.users.find(u => u.id === id);
  state.users = state.users.filter(u => u.id !== id);
  await deleteFromFirebase('users', id);
  await addAudit('Eliminación usuario: ' + (user?.email || ''));
  showToast('Usuario eliminado', 'success');
  render();
}

function exportRequestsPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16); doc.setTextColor(57,169,0);
  doc.text('SENA - Solicitudes', 14, 20);
  doc.setFontSize(10); doc.setTextColor(100);
  doc.text('Generado: ' + new Date().toLocaleString('es-CO'), 14, 28);
  const rows = state.requests.map(r => {
    const u = state.users.find(x => x.id === r.userId);
    const progs = r.programs.map(pid => state.programs.find(p => p.id === pid)).filter(Boolean).map(p => p.name).join(', ');
    return [r.id.slice(-6).toUpperCase(), u?.name || '', u?.company || '', progs.substring(0,40), r.apprenticeRange, r.schedule, r.status, r.createdAt];
  });
  doc.autoTable({ startY: 35, head: [['ID','Empresario','Empresa','Programas','Aprendices','Horario','Estado','Fecha']], body: rows, theme: 'grid', headStyles: { fillColor: [57,169,0] } });
  doc.save('solicitudes_sena.pdf');
  showToast('PDF exportado', 'success');
}

function exportRequestsExcel() {
  const data = state.requests.map(r => {
    const u = state.users.find(x => x.id === r.userId);
    const progs = r.programs.map(pid => state.programs.find(p => p.id === pid)).filter(Boolean).map(p => p.name).join(', ');
    return { ID: r.id.slice(-6).toUpperCase(), Empresario: u?.name, Empresa: u?.company, Programas: progs, Aprendices: r.apprenticeRange, Horario: r.schedule, Estado: r.status, Fecha: r.createdAt };
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Solicitudes');
  XLSX.writeFile(wb, 'solicitudes_sena.xlsx');
  showToast('Excel exportado', 'success');
}
